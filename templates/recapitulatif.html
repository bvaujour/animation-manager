{% extends "base.html" %}
{% load static %}
{% block title %}Récapitulatif{% endblock %}
{% block extra_head %}<link rel="stylesheet" href="{% static 'css/recapitulatif.css' %}">{% endblock %}
{% block content %}
<main class="recap-page">
    <header class="recap-header"><div><h1>Récapitulatif</h1><p class="page-intro">Nombre de jours travaillés par animateur, répartis par centre.</p></div></header>
    <section class="periode-card" aria-label="Choix de la période">
        <label>Début<input type="date" id="periode-debut"></label>
        <label>Fin<input type="date" id="periode-fin"></label>
        <button id="btn-appliquer-periode" class="btn" type="button">Afficher</button>
    </section>
    <section class="table-card">
        <div class="table-header"><h2>Jours travaillés</h2><p id="periode-affichee"></p></div>
        <div class="table-scroll"><table class="recap-table" id="table-recap"><thead></thead><tbody></tbody></table></div>
    </section>
</main>
{% endblock %}
{% block scripts %}<script src="{% static 'js/recapitulatif.js' %}"></script>{% endblock %}
