{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestion équipe animation{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% csrf_token %}
    {% include "partials/_nav.html" with active=active_page %}
    {% block content %}{% endblock %}

    <script src="{% static 'js/ui.js' %}"></script>
    <script src="{% static 'js/common/documents.js' %}"></script>
    <script src="{% static 'js/common/colors.js' %}"></script>
    <script src="{% static 'js/common/forms.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
