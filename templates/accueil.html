{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion équipe animation</title>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    {% include "partials/_nav.html" with active="accueil" %}

    <main class="home-page">
        <section class="home-section home-planning-section">
            <div class="section-heading home-calendar-heading">
                <div>
                    <h2>Planning</h2>
                    <span class="section-note">Période affichée : <strong id="home-visible-period">chargement...</strong></span>
                </div>

                <div class="home-calendar-tools">
                    <div class="home-view-toggle" aria-label="Choix de la vue">
                        <button type="button" class="btn btn-ghost active" id="home-view-week">Semaine</button>
                        <button type="button" class="btn btn-ghost" id="home-view-month">Mois</button>
                    </div>

                    <div class="home-week-controls" aria-label="Navigation planning">
                        <button type="button" class="btn btn-ghost" id="home-prev-week">← Précédent</button>
                        <button type="button" class="btn btn-ghost" id="home-current-week">Aujourd’hui</button>
                        <button type="button" class="btn btn-ghost" id="home-next-week">Suivant →</button>
                    </div>
                </div>
            </div>
            <div id="home-calendars" class="home-calendars"></div>
        </section>

        <section class="home-section">
            <div class="section-heading">
                <h2>Documents disponibles</h2>
                <span class="section-note">Téléchargement direct</span>
            </div>
            <div id="home-documents" class="home-documents"></div>
        </section>
    </main>

    <script src="{% static 'js/accueil.js' %}"></script>
</body>
</html>
