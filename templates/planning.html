{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning équipe</title>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/gestion.css' %}">
    <link rel="stylesheet" href="{% static 'css/planning.css' %}">
</head>

<body>
    {% csrf_token %}
    {% include "partials/_nav.html" with active="planning" %}

    <main id="layout">

        <aside id="animateurs-panel">
            <h2 class="section-title">Équipe</h2>
            <div id="animateurs-list"></div>
        </aside>

        <section id="calendars-section">

            <div id="planning-view-switcher" class="planning-control-block toolbar-views" role="group" aria-label="Changer de vue">
                <button class="btn btn-ghost view-btn active" data-view="dayGridWeek" type="button">Semaine</button>
                <button class="btn btn-ghost view-btn" data-view="dayGridMonth" type="button">Mois</button>
            </div>

            <div id="planning-period-nav" class="planning-control-block toolbar-period">
                <button id="btn-prev" class="btn btn-ghost" type="button" aria-label="Période précédente">‹</button>
                <span id="toolbar-label" class="toolbar-label"></span>
                <button id="btn-next" class="btn btn-ghost" type="button" aria-label="Période suivante">›</button>
                <button id="btn-today" class="btn btn-ghost" type="button">Aujourd'hui</button>
            </div>

            <div id="calendars-container"></div>

            <div id="planning-actions" class="planning-control-block toolbar-actions">
                <button id="btn-auto-semaine" class="btn btn-primary" type="button">Remplir auto</button>
                <button id="btn-vider-semaine" class="btn btn-danger-solid" type="button">Vider la semaine</button>
            </div>

        </section>

    </main>


    <div class="modal-backdrop" id="modal-auto-remplissage" hidden>
        <div class="modal-box modal-box-small">
            <div class="modal-header">
                <h2>Remplissage automatique</h2>
                <button class="modal-close" data-modal-close type="button" aria-label="Fermer">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-auto-remplissage-content"></div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/ui.js' %}"></script>
    <script src="{% static 'js/gestion.js' %}"></script>
    <script src="{% static 'js/planning.js' %}"></script>
</body>
</html>
